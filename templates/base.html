<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StoryPost{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-loader" aria-hidden="true">
        <div class="loader-spinner"></div>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="{{ url_for('index') }}">📖 StoryPost</a>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('manage_categories') }}" class="nav-link">Categories</a>
                <a href="{{ url_for('create_post') }}" class="nav-link btn-create">+ New Story</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container page-content">
        {% set flashed_messages = get_flashed_messages(with_categories=true) %}
        {% if flashed_messages %}
            <script type="application/json" id="flashMessages">{{ flashed_messages|tojson }}</script>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <div class="sweet-overlay" id="sweetOverlay" aria-hidden="true">
        <div class="sweet-dialog" role="dialog" aria-modal="true" aria-labelledby="sweetTitle">
            <div class="sweet-icon" id="sweetIcon"></div>
            <h2 id="sweetTitle">Done</h2>
            <p id="sweetMessage"></p>
            <div class="sweet-actions">
                <button type="button" class="btn btn-secondary" id="sweetCancel">Cancel</button>
                <button type="button" class="btn btn-primary" id="sweetConfirm">OK</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 StoryPost. Your personal story collection.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
